name: Day 7 - CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: npm install
        working-directory: app

      - name: Test
        run: npm test
        working-directory: app

  deploy:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy
        run: echo "Deploying application..."
